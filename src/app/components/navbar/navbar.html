<nav class="navbar" role="navigation" aria-label="Navigation principale">
  <div class="container nav-inner">
    <!-- Logo -->
    <a routerLink="/" class="nav-logo" aria-label="UKARIMU International — Accueil">
      <img class="logo-full"  ngSrc="/images/logo.png"      width="160" height="48" alt="Ukarimu International" priority />
      <img class="logo-icon"  ngSrc="/images/logo-icon.png" width="40"  height="40" alt="UKI" priority />
    </a>

    <!-- Desktop links -->
    <ul class="nav-links" role="list">
      @for (link of navLinks(); track link.path) {
        <li>
          <a [routerLink]="link.path"
             routerLinkActive="active"
             [routerLinkActiveOptions]="{ exact: link.path === '/' }"
             class="nav-link"
             (click)="closeMenu()">
            {{ link.label }}
          </a>
        </li>
      }
    </ul>

    <!-- Language toggle + CTA -->
    <div class="nav-actions">
      <button
        class="lang-toggle"
        (click)="i18n.toggleLang()"
        [attr.aria-label]="i18n.lang() === 'fr' ? 'Switch to English' : 'Passer en Français'">
        {{ i18n.lang() === 'fr' ? 'EN' : 'FR' }}
      </button>
      <a routerLink="/contact" class="btn-primary nav-cta" (click)="closeMenu()">
        {{ t().nav.contactBtn }}
      </a>
    </div>

    <!-- Hamburger -->
    <button
      class="hamburger"
      (click)="toggleMenu()"
      [attr.aria-expanded]="menuOpen()"
      aria-label="Menu"
      aria-controls="mobile-menu">
      <span></span><span></span><span></span>
    </button>
  </div>

  <!-- Mobile menu -->
  <div
    id="mobile-menu"
    class="mobile-menu"
    [class.open]="menuOpen()"
    role="dialog"
    [attr.aria-hidden]="!menuOpen()"
    aria-label="Navigation mobile">
    <ul role="list">
      @for (link of navLinks(); track link.path) {
        <li>
          <a [routerLink]="link.path"
             routerLinkActive="active"
             [routerLinkActiveOptions]="{ exact: link.path === '/' }"
             class="mobile-link"
             (click)="closeMenu()">
            {{ link.label }}
          </a>
        </li>
      }
      <li class="mobile-actions">
        <button class="lang-toggle" (click)="i18n.toggleLang()">
          {{ i18n.lang() === 'fr' ? 'English' : 'Français' }}
        </button>
        <a routerLink="/contact" class="btn-primary mobile-cta" (click)="closeMenu()">
          {{ t().nav.contactBtn }}
        </a>
      </li>
    </ul>
  </div>
</nav>
