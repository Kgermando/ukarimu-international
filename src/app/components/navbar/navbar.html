<nav class="navbar">
  <div class="container nav-inner">
    <!-- Logo -->
    <a href="#hero" class="nav-logo" (click)="scrollTo('#hero', $event)" aria-label="Ukarimu International — Accueil">
      <img class="logo-full"  ngSrc="/images/logo.png"      width="160" height="48" alt="Ukarimu International" priority />
      <img class="logo-icon"  ngSrc="/images/logo-icon.png" width="40"  height="40" alt="UKI" priority />
    </a>

    <!-- Desktop links -->
    <ul class="nav-links" role="list">
      @for (link of links; track link.anchor) {
        <li>
          <a [href]="link.anchor" (click)="scrollTo(link.anchor, $event)" class="nav-link">
            {{ link.label }}
          </a>
        </li>
      }
    </ul>

    <!-- CTA -->
    <a href="#contact" class="btn-primary nav-cta" (click)="scrollTo('#contact', $event)">
      Nous contacter
    </a>

    <!-- Hamburger -->
    <button
      class="hamburger"
      (click)="toggleMenu()"
      [attr.aria-expanded]="menuOpen()"
      aria-label="Menu"
      aria-controls="mobile-menu">
      <span></span><span></span><span></span>
    </button>
  </div>

  <!-- Mobile menu -->
  <div
    id="mobile-menu"
    class="mobile-menu"
    [class.open]="menuOpen()"
    role="dialog"
    aria-label="Navigation mobile">
    <ul role="list">
      @for (link of links; track link.anchor) {
        <li>
          <a [href]="link.anchor" (click)="scrollTo(link.anchor, $event)" class="mobile-link">
            {{ link.label }}
          </a>
        </li>
      }
      <li>
        <a href="#contact" class="btn-primary mobile-cta" (click)="scrollTo('#contact', $event)">
          Nous contacter
        </a>
      </li>
    </ul>
  </div>
</nav>
